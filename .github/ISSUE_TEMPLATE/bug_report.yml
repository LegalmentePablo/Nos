name: Bug report
description: Report a bug or regression in the local assistant
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill all relevant sections.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Short description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Exact steps to reproduce the issue
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, branch, and relevant config details
      placeholder: Windows 11, Python 3.11+, branch name, dry_run true/false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Trace
      description: Paste relevant output from logs/assistant.log or terminal

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I ran ./scripts/quality_check.ps1 locally
        - label: I removed sensitive information from logs and screenshots
